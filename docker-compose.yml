services:
  postgres-service:
    image: postgres:16
    container_name: postgres-service
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-service-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce_user} -d ${POSTGRES_DB:-ecommerce_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    image: ${PRODUCT_SERVICE_IMAGE:-your-dockerhub-username/product-service:latest}
    container_name: product-service
    environment:
      PORT: 8081
      DB_URL: jdbc:postgresql://postgres-service:5432/${POSTGRES_DB:-ecommerce_db}
      DB_USERNAME: ${POSTGRES_USER:-ecommerce_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_password}
    ports:
      - "${PRODUCT_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres-service:
        condition: service_healthy

  order-service:
    image: ${ORDER_SERVICE_IMAGE:-your-dockerhub-username/order-service:latest}
    container_name: order-service
    environment:
      PORT: 8082
      DB_URL: jdbc:postgresql://postgres-service:5432/${POSTGRES_DB:-ecommerce_db}
      DB_USERNAME: ${POSTGRES_USER:-ecommerce_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_password}
      PRODUCT_SERVICE_URL: http://product-service:8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      ORDER_EXCHANGE: ${ORDER_EXCHANGE:-orders.exchange}
      ORDER_QUEUE: ${ORDER_QUEUE:-orders.created.queue}
      ORDER_ROUTING_KEY: ${ORDER_ROUTING_KEY:-orders.created}
    ports:
      - "${ORDER_SERVICE_PORT:-8082}:8082"
    depends_on:
      product-service:
        condition: service_started
      postgres-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    image: ${NOTIFICATION_SERVICE_IMAGE:-your-dockerhub-username/notification-service:latest}
    container_name: notification-service
    environment:
      PORT: 8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      ORDER_EXCHANGE: ${ORDER_EXCHANGE:-orders.exchange}
      ORDER_QUEUE: ${ORDER_QUEUE:-orders.created.queue}
      ORDER_ROUTING_KEY: ${ORDER_ROUTING_KEY:-orders.created}
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-service-data:
